---
- name: Verify
  hosts: all
  gather_facts: false
  any_errors_fatal: true

  tasks:
    - name: "Include default vars"
      ansible.builtin.include_vars:
        dir: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/defaults/"
        extensions: ['yml']

    - name: "Check if wireguard_exporter is installed"
      changed_when: false
      ansible.builtin.command: "wireguard_exporter --version"
      register: wg_exporter_installed_version

    - name: "Check wireguard_exporter version"
      ansible.builtin.assert:
        that: "wg_exporter_installed_version.stdout is regex('{{ wg_exporter_version }}')"
        success_msg: "wireguard_exporter version {{ wg_exporter_version }} is installed and working"
        fail_msg: "wireguard_exporter version {{ wg_exporter_version }} is not installed or not working correctly"

    # kics-scan ignore-block
    - name: "Check if /metrics endpoint is reachable"
      ansible.builtin.uri:
        url: "http://{{ wg_exporter_listen_address }}:{{ wg_exporter_listen_port }}/metrics"
        return_content: true
        status_code: 200
        timeout: 5
      register: wg_exporter_metrics_check

    - name: "Fail if /metrics doesn't contain wireguard_exporter_build_info line"
      ansible.builtin.assert:
        that: "'wireguard_scrape_success' in wg_exporter_metrics_check.content"
        fail_msg: "wireguard_exporter /metrics endpoint doesn't contain wireguard_scrape_success line!"
        success_msg: "wireguard_exporter /metrics endpoint contains wireguard_scrape_success line!"
