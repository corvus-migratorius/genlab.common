---
- name: "Install wireguard_exporter from binary"
  block:
    - name: "Check wireguard_exporter version"
      changed_when: false
      ansible.builtin.command:
        cmd: "wireguard_exporter --version"
      register: wg_exporter_ver

    - name: "Assert version correctness"
      ansible.builtin.assert:
        that: "wg_exporter_ver.stdout is regex('{{ wg_exporter_version }}')"
        success_msg: "wireguard_exporter version {{ wg_exporter_version }} is installed and working"
        fail_msg: "wireguard_exporter version {{ wg_exporter_version }} is not installed or not working correctly"

  rescue:
    - name: Ensure the destination for tmp wg_exporter directory exists
      ansible.builtin.file:
        path: /tmp/wireguard_exporter-v{{ wg_exporter_version }}
        state: directory
        mode: '0755'

    - name: "Unarchive wireguard_exporter tar file"
      notify: "(Re)start and enable wireguard_exporter"
      ansible.builtin.unarchive:
        src: "https://github.com/kbknapp/wireguard_exporter/releases/\
              download/v{{ wg_exporter_version }}/wireguard_exporter-v{{ wg_exporter_version }}-x86_64-linux-musl.tar.gz"
        dest: "/tmp/wireguard_exporter-v{{ wg_exporter_version }}"
        remote_src: true

    - name: "Move wireguard_exporter binary"
      become: true
      ansible.builtin.copy:
        src: "/tmp/wireguard_exporter-v{{ wg_exporter_version }}/wireguard_exporter"
        dest: "/usr/sbin/wireguard_exporter"
        mode: "0755"
        owner: root
        group: root
        remote_src: true

- name: Create systemd service file
  become: true
  ansible.builtin.template:
    src: wireguard_exporter.service.j2
    dest: /etc/systemd/system/wireguard_exporter.service
    owner: root
    group: root
    mode: '0644'
